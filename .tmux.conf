# To make changes in this file work run: tmux source-file ~/.tmux.conf

set-option -g default-shell /bin/zsh

# Enable mouse
set -g mouse on

set-option -s set-clipboard off
# To be able to copy text inside tmux session inside Hyprland:
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy 2>/dev/null || xclip -selection clipboard -i > /dev/null 2>&1"
# Old copying config for X11 only (TODO: remove after fully migrating to Hyprland):
# bind -T copy-mode-vi y send-keys -X copy-pipe "xclip -selection clipboard -i > /dev/null 2>&1" \; send-keys -X clear-selection


setw -g mode-keys vi
set -g status-keys vi

# Set history limit
set-option -g history-limit 50000

# To make PROMPT colors properly work
set-option -g default-terminal "screen-256color"

# TODO: remove or modify since now this functionality is being handled by Waybar
# Set status on the right bottom
# set -g status-right '#{ram_fg_color}CPU:#{cpu_percentage}|RAM:#{ram_percentage}|ᯤ:#{online_status}|#(TZ="Poland" date +%%H:%%M:%%S🕒%%-d-%%-m-%%Y)'
# set -g status-interval 1
# set -g status-right-length 60

# change status bar colors to gray
set -g status-bg colour235
set -g status-fg colour246

# Plugins. Hit prefix + I (capital i, as in Install) to fetch the plugin and source it.
# set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-online-status'

# Remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Start window numbering at 1
set -g base-index 1

# Because nvim checkhealth suggested it
set -sg escape-time 10
set-option -sa terminal-overrides ',alacritty:RGB'
set-option -g focus-events on

# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# ─── Make the ACTIVE pane unmistakable ──────────────────────────────────────
# Three stacked cues so it's obvious at a glance which pane has focus:

# (Background-dimming of inactive panes is intentionally NOT used: every pane
#  here runs a full-screen TUI that paints its own bg, so dimming is unreliable
#  and `bg=default` fails to restore cleanly. The cues below work regardless.)

# 1. Bold, heavy, brightly-colored border on the active pane; inactive stay thin/gray.
set -g pane-border-lines heavy
set -g pane-border-indicators both
set -g pane-border-style        'fg=colour238'
set -g pane-active-border-style 'fg=colour46,bold'

# 2. Per-pane label on the border that calls out the active pane explicitly.
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[fg=colour46 bold]►► #P #{pane_current_command} ◄◄,#[fg=colour240]   #P #{pane_current_command}}'

# 3. Status-bar marker: highlight the active window/pane location in green.
set -g status-right '#[fg=colour46 bold]● pane #P #{pane_current_command} #[default]'
set -g status-right-length 40
# ────────────────────────────────────────────────────────────────────────────

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

